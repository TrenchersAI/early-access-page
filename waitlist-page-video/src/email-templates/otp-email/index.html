<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>TrenchersAI OTP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <table role="presentation" class="email-shell" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table role="presentation" class="email-card" cellpadding="0" cellspacing="0">
            <tr>
              <td class="navbar">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td class="brand-cell" align="left">
                      <img
                        src="/email-templates/early-access-hero/logo.svg"
                        alt="Trenchers"
                        class="logo-img"
                      />
                    </td>
                    <td class="nav-text" align="right">OTP Verification</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td class="hero">
                <h1>Your verification code</h1>
                <p class="otp-label">Use this one-time code to continue:</p>
                <div class="otp-code">482913</div>
                <p class="otp-note">This code expires in 10 minutes.</p>
              </td>
            </tr>
            <tr>
              <td class="footer">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td class="footer-left" align="left">© 2026 TrenchersAI. All rights reserved.</td>
                    <td class="footer-right" align="right">
                      <a href="/terms" class="footer-link">Terms</a>&nbsp;&nbsp;&nbsp;
                      <a href="/privacy" class="footer-link">Privacy</a>&nbsp;&nbsp;&nbsp;
                      <a href="https://x.com/TrenchersAI" class="footer-link">X</a>&nbsp;&nbsp;&nbsp;
                      <a href="https://www.linkedin.com/company/trenchersai/" class="footer-link">LinkedIn</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
